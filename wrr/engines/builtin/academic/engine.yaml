{
  "schema_version": 1,
  "id": "academic",
  "name": "Academic",
  "kind": "web_api",
  "adapter": "wrr.engines.academic:AcademicEngine",
  "capabilities": {
    "actions": ["search"],
    "domains": ["academic", "papers", "research", "web"]
  },
  "routing": {
    "modes": ["auto", "academic", "research"],
    "weight": 0.3,
    "triggers": [
      {
        "name": "academic_keywords",
        "match": {
          "keywords": [
            "论文",
            "综述",
            "survey",
            "methodology",
            "algorithm",
            "paper",
            "arxiv",
            "doi",
            "citation",
            "preprint",
            "peer review",
            "literature",
            "state of the art"
          ]
        }
      }
    ]
  },
  "fusion": {
    "rrf_k": 60,
    "dedup_key": "canonical_url",
    "weights_merge_policy": "multiply"
  },
  "requirements": {
    "env": [],
    "binaries": [],
    "repos": [
      {
        "dep_id": "paper_search_mcp",
        "name": "paper_search_mcp",
        "capability": "academic_search",
        "remote": "https://github.com/openags/paper-search-mcp",
        "required": false,
        "description": "学术论文 MCP 搜索服务（可选增强）"
      }
    ]
  },
  "health": {
    "checks": []
  },
  "requires_capabilities": {}
}
