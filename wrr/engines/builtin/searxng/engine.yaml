{
  "schema_version": 1,
  "id": "searxng",
  "name": "SearXNG",
  "kind": "web_api",
  "adapter": "wrr.engines.searxng:SearxngEngine",
  "capabilities": {
    "actions": ["search"],
    "domains": ["web"]
  },
  "routing": {
    "modes": ["auto", "web", "default"],
    "weight": 0.7,
    "triggers": []
  },
  "fusion": {
    "rrf_k": 60,
    "dedup_key": "canonical_url",
    "weights_merge_policy": "multiply"
  },
  "requirements": {
    "env": [
      {
        "dep_id": "searxng_url",
        "name": "SEARXNG_URL",
        "required": false,
        "secret": false,
        "source_url": "https://github.com/searxng/searxng",
        "description": "SearXNG 实例 URL（恢复模式兜底引擎）"
      }
    ],
    "binaries": [],
    "repos": [],
    "docker": [
      {
        "dep_id": "searxng",
        "name": "searxng",
        "container": "searxng",
        "health_url": "http://127.0.0.1:32080",
        "required": false,
        "source_url": "https://github.com/searxng/searxng",
        "description": "SearXNG 无搜索引擎（恢复模式兜底）"
      }
    ]
  },
  "health": {
    "checks": [
      {"type": "env_present", "env": "SEARXNG_URL", "required": true}
    ]
  },
  "requires_capabilities": {
    "can_read_user_env": true
  }
}
