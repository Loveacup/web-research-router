{
  "schema_version": 1,
  "id": "community",
  "name": "Community",
  "kind": "web_api",
  "adapter": "wrr.engines.community:CommunityEngine",
  "capabilities": {
    "actions": ["search"],
    "domains": ["community", "social", "forums", "web"]
  },
  "routing": {
    "modes": ["auto", "platform", "research", "discovery", "broad"],
    "weight": 0.3,
    "triggers": [
      {
        "name": "community_sites",
        "match": {
          "keywords": [
            "site:reddit.com",
            "site:news.ycombinator.com",
            "site:twitter.com",
            "site:x.com",
            "site:zhihu.com",
            "site:weibo.com"
          ]
        }
      },
      {
        "name": "community_platform_names",
        "match": {
          "keywords": [
            "reddit",
            "hacker news",
            "hackernews",
            "hn",
            "twitter",
            "v2ex",
            "zhihu",
            "微博",
            "weibo",
            "小红书",
            "xiaohongshu"
          ]
        }
      },
      {
        "name": "practical_intent",
        "match": {
          "keywords": [
            "怎么用",
            "如何使用",
            "使用方法",
            "操作指南",
            "教程",
            "快捷键",
            "实战",
            "实践",
            "经验",
            "踩坑",
            "避坑",
            "最佳实践",
            "推荐",
            "值得",
            "哪个好",
            "怎么选",
            "how to",
            "guide",
            "tutorial",
            "shortcuts",
            "keybindings",
            "best practice",
            "tips",
            "tricks",
            "gotchas",
            "worth it"
          ]
        }
      }
    ]
  },
  "fusion": {
    "rrf_k": 60,
    "dedup_key": "canonical_url",
    "weights_merge_policy": "multiply"
  },
  "requirements": {
    "env": [],
    "binaries": [
      {
        "dep_id": "opencli",
        "name": "opencli",
        "version_flag": "--version",
        "required": true,
        "source_url": "https://github.com/Panniantong/Agent-Reach",
        "description": "OpenCLI 社区搜索 CLI（Agent-Reach 提供）"
      }
    ],
    "repos": [
      {
        "dep_id": "last30days_en",
        "name": "last30days_en",
        "capability": "recent_web_search",
        "env": "WRR_LAST30DAYS_EN",
        "default_path": "~/code/last30days-skill/skills/last30days/scripts/last30days.py",
        "remote": "https://github.com/mvanhorn/last30days-skill",
        "required": true,
        "description": "英文社区搜索（Reddit/X/YouTube）"
      },
      {
        "dep_id": "last30days_cn",
        "name": "last30days_cn",
        "capability": "recent_web_search",
        "env": "WRR_LAST30DAYS_CN",
        "default_path": "~/code/last30days-skill-cn/skills/last30days/scripts/last30days.py",
        "remote": "https://github.com/Jesseovo/last30days-skill-cn",
        "required": true,
        "description": "中文社区搜索（微博/小红书/B站/知乎等）"
      },
      {
        "dep_id": "agent_reach",
        "name": "agent_reach",
        "capability": "internet_access",
        "remote": "https://github.com/Panniantong/Agent-Reach",
        "required": true,
        "description": "Agent-Reach 互联网接入（OpenCLI 底层渠道）"
      }
    ]
  },
  "health": {
    "checks": [
      {"type": "binary_present", "binary": "opencli", "required": false}
    ]
  },
  "requires_capabilities": {}
}
