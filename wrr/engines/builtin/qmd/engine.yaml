{
  "schema_version": 1,
  "id": "qmd",
  "name": "QMD Local Knowledge",
  "kind": "local_cli",
  "adapter": "wrr.engines.local_qmd:LocalQmdEngine",
  "capabilities": {
    "actions": ["search"],
    "domains": ["local_kb", "notes"]
  },
  "routing": {
    "modes": ["auto", "local", "qmd"],
    "weight": 1.0,
    "triggers": []
  },
  "fusion": {
    "rrf_k": 60,
    "dedup_key": "canonical_url",
    "weights_merge_policy": "multiply"
  },
  "requirements": {
    "env": [],
    "binaries": [
      {
        "dep_id": "qmd",
        "name": "qmd",
        "version_flag": "--version",
        "required": true,
        "source_url": "https://github.com/qmd/qmd",
        "description": "qmd 全文搜索引擎（Obsidian vault 索引）",
        "extra_paths": ["/opt/homebrew/bin/qmd"]
      }
    ],
    "repos": []
  },
  "health": {
    "checks": [
      {"type": "binary_present", "binary": "qmd", "required": true}
    ]
  },
  "requires_capabilities": {
    "local_kb": true,
    "can_spawn_cli": true
  }
}
