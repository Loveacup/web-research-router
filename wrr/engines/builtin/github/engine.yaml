{
  "schema_version": 1,
  "id": "github",
  "name": "GitHub",
  "kind": "web_api",
  "adapter": "wrr.engines.github:GitHubEngine",
  "capabilities": {
    "actions": ["search", "extract"],
    "domains": ["code", "issues", "repositories"]
  },
  "routing": {
    "modes": ["auto", "github", "code"],
    "weight": 1.0,
    "triggers": [
      {
        "name": "github_site_filter",
        "match": {
          "keywords": ["site:github.com"]
        }
      }
    ]
  },
  "fusion": {
    "rrf_k": 60,
    "dedup_key": "canonical_url",
    "weights_merge_policy": "multiply"
  },
  "requirements": {
    "env": [
      {
        "dep_id": "github_token",
        "name": "GITHUB_TOKEN",
        "required": true,
        "secret": true,
        "source_url": "https://github.com/settings/tokens",
        "description": "GitHub 个人访问令牌（代码搜索 + issue 搜索）"
      }
    ],
    "binaries": [],
    "repos": []
  },
  "health": {
    "checks": [
      {"type": "env_present", "env": "GITHUB_TOKEN", "required": true}
    ]
  },
  "requires_capabilities": {
    "can_read_user_env": true
  }
}
